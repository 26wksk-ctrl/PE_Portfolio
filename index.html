<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.google.com https://apis.google.com https://www.recaptcha.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://www.gstatic.com https://apis.google.com https://*.googleapis.com https://*.google.com https://*.firebaseio.com https://*.firebaseapp.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; img-src 'self' data: https://lh3.googleusercontent.com; frame-src https://accounts.google.com https://apis.google.com https://*.firebaseapp.com https://www.google.com https://www.recaptcha.net; object-src 'none'; base-uri 'self'; form-action 'self';">
  <title>자기주도 체육탐구 포트폴리오</title>
  <link rel="stylesheet" href="./css/styles.css">

  <!-- Firebase 모듈을 짧은 별칭으로 import 하기 위한 import map -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js",
        "firebase/app-check": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js"
      }
    }
  </script>
</head>

<body>
  <div id="loading" class="loading"><div id="loadingText" class="loading-inner">불러오는 중...</div></div>
  <div id="app" class="container"></div>

  <!-- 모바일 디버그 도구: 주소에 ?debug=1 이 있을 때만 Eruda를 켭니다. -->
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      if (!params.has('debug')) return;
      if (window.__PE_ERUDA_LOADING__ || window.__PE_ERUDA_READY__) return;

      window.__PE_ERUDA_LOADING__ = true;
      var script = document.createElement('script');
      script.src = './js/vendor/eruda.js';
      script.async = false;
      script.onload = function () {
        window.__PE_ERUDA_LOADING__ = false;
        if (window.eruda && !window.__PE_ERUDA_READY__) {
          window.eruda.init();
          window.__PE_ERUDA_READY__ = true;
          console.info('[debug] Eruda enabled. Remove ?debug=1 to disable it.');
        }
      };
      script.onerror = function () {
        window.__PE_ERUDA_LOADING__ = false;
        console.warn('[debug] ./js/vendor/eruda.js 파일을 불러오지 못했습니다.');
      };
      document.head.appendChild(script);
    })();
  </script>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
