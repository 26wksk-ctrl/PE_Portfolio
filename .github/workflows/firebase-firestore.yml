name: Deploy Firestore Rules and Indexes

# firestore.rules / firestore.indexes.json 가 main 에 올라오면 자동으로 Firebase 에 게시한다.
# (Hosting 배포와 별개로, 규칙이 코드와 어긋나는 사고를 막기 위한 워크플로)
# 수동 실행도 가능: Actions 탭 → 이 워크플로 → Run workflow.

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.github/workflows/firebase-firestore.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT_PE_PORTFOLIO: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PE_PORTFOLIO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Deploy Firestore rules and indexes
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT_PE_PORTFOLIO != '' }}
        shell: bash
        run: |
          set -euo pipefail

          SERVICE_ACCOUNT_FILE="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_PE_PORTFOLIO" > "$SERVICE_ACCOUNT_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_FILE"

          # firebase deploy 는 게시 전에 규칙을 컴파일/검증하므로, 문법 오류가 있으면 여기서 실패한다.
          npx firebase-tools@15.22.3 deploy \
            --only firestore:rules,firestore:indexes \
            --project pe-portfolio \
            --non-interactive

          echo "Firestore rules/indexes deploy completed."

      - name: Skip deploy when Firebase secret is missing
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT_PE_PORTFOLIO == '' }}
        run: |
          echo "::warning::FIREBASE_SERVICE_ACCOUNT_PE_PORTFOLIO secret is missing. Skipping Firestore deploy."
